<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUKGOO — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --line: #2a2a2a;
    --text: #e8e8e0;
    --muted: #666;
    --accent: #c8f060;
    --accent2: #ff5a36;
    --white: #f5f5f0;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
    background: none;
    border: none;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
  }

  .nav-links a:hover,
  .nav-links a.active { color: var(--accent); }

  /* ── SECTIONS ── */
  section {
    display: none;
    min-height: 100vh;
    padding: 100px 48px 80px;
  }

  section.visible { display: block; }

  /* ── MAIN PAGE ── */
  #main {
    display: none;
    flex-direction: column;
    padding: 80px 0 0;
  }

  #main.visible { display: flex; }

  .main-hero {
    position: relative;
    width: 100%;
  }

  /* 16:9 이미지 공간 */
  .hero-image-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--bg3);
    overflow: hidden;
  }

  .hero-image-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .hero-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .hero-placeholder-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px dashed var(--line);
    padding: 10px 20px;
  }

  .hero-placeholder-size {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--line);
    letter-spacing: 1px;
  }

  /* 이름 + 태그 오버레이 (이미지 위 좌하단) */
  .hero-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 48px;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .hero-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 100px);
    line-height: 0.9;
    letter-spacing: 3px;
    color: var(--white);
  }

  .hero-name span { color: var(--accent); }

  .hero-tags {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .hero-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* 메인 하단 CTA 영역 */
  .main-cta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 48px;
    border-bottom: 1px solid var(--line);
  }

  .main-cta-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .main-cta-btns {
    display: flex;
    gap: 12px;
  }

  /* ── WORKS ── */
  #works {
    max-width: 1300px;
    margin: 0 auto;
    width: 100%;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
    color: var(--white);
  }

  .section-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
  }

  .portfolio-card {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
    cursor: pointer;
    background: var(--bg3);
  }

  .portfolio-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
    display: block;
  }

  .portfolio-card:hover img { transform: scale(1.06); }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
  }

  .portfolio-card:hover .card-overlay { opacity: 1; }

  .card-date {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 4px;
  }

  .card-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg3);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--line);
    letter-spacing: 2px;
  }

  /* ── ABOUT PAGE ── */
  #about {
    display: none;
    flex-direction: column;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
    gap: 0;
  }

  #about.visible { display: flex; }

  /* 프로필 사진 */
  .about-photo-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    background: var(--bg3);
    overflow: hidden;
    margin-bottom: 64px;
  }

  .about-photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .about-photo-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .about-photo-placeholder span {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    border: 1px dashed var(--line);
    padding: 10px 20px;
  }

  .about-photo-placeholder small {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--line);
    letter-spacing: 1px;
  }

  /* About 각 블록 */
  .about-block {
    padding: 48px 0;
    border-top: 1px solid var(--line);
  }

  .about-block-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* 연락처 */
  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .contact-row {
    display: grid;
    grid-template-columns: 120px 1fr auto;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
  }

  .contact-type {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .contact-value {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
  }

  .contact-action {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: 1px solid var(--line);
    padding: 6px 12px;
    color: var(--text);
    transition: all 0.2s;
  }

  .contact-action:hover { border-color: var(--accent); color: var(--accent); }

  /* 스킬 / 프로그램 */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 2px;
  }

  .skill-card {
    background: var(--bg3);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background 0.2s;
  }

  .skill-card:hover { background: var(--bg2); }

  .skill-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
  }

  .skill-category {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .skill-level {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .skill-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--line);
  }

  .skill-dot.on { background: var(--accent); }

  /* ── BTN ── */
  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    border: 1px solid var(--accent);
  }

  .btn-primary:hover { background: transparent; color: var(--accent); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line);
  }

  .btn-ghost:hover { border-color: var(--text); }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(8px);
  }

  .lightbox.open { display: flex; align-items: center; justify-content: center; }

  .lb-inner {
    display: flex;
    width: 90vw;
    max-width: 1200px;
    height: 85vh;
    gap: 24px;
  }

  .lb-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .lb-img-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg2);
    overflow: hidden;
  }

  .lb-img-wrap img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
  }

  .lb-img-placeholder {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: var(--line);
    letter-spacing: 4px;
  }

  .lb-meta {
    padding: 16px 0;
    border-top: 1px solid var(--line);
  }

  .lb-meta-date {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .lb-meta-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
  }

  .lb-sidebar {
    width: 140px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }

  .lb-thumb {
    aspect-ratio: 1;
    background: var(--bg3);
    cursor: pointer;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .lb-thumb.active { border-color: var(--accent); }

  .lb-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .lb-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    padding: 4px;
  }

  .lb-close {
    position: fixed;
    top: 24px; right: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    background: none;
    border: 1px solid var(--line);
    padding: 8px 14px;
    color: var(--text);
    transition: all 0.2s;
    z-index: 201;
    cursor: pointer;
  }

  .lb-close:hover { border-color: var(--accent2); color: var(--accent2); }

  .lb-nav {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 201;
  }

  .lb-nav button {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 20px;
    background: var(--bg2);
    border: 1px solid var(--line);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .lb-nav button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 40px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1300px;
    margin: 0 auto;
  }

  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--muted);
  }

  .footer-email {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
    background: none;
    border: none;
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .footer-email:hover { color: var(--accent); }

  .footer-back {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    background: none;
    border: 1px solid var(--line);
    padding: 8px 16px;
    color: var(--text);
    transition: all 0.2s;
    cursor: pointer;
  }

  .footer-back:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: var(--white);
    color: #0a0a0a;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 16px 32px;
    opacity: 0;
    transition: all 0.25s;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ── FADE ── */
  .fade-in {
    animation: fadeIn 0.35s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-links { gap: 16px; }
    .nav-links a { font-size: 10px; }
    section { padding: 80px 20px 60px; }
    .hero-overlay { padding: 24px; }
    .main-cta { padding: 20px 20px; flex-direction: column; align-items: flex-start; gap: 16px; }
    .portfolio-grid { grid-template-columns: 1fr 1fr; }
    .lb-inner { flex-direction: column; height: 95vh; }
    .lb-sidebar { width: 100%; flex-direction: row; height: 80px; }
    footer { flex-direction: column; gap: 16px; text-align: center; padding: 28px 20px; }
    .contact-row { grid-template-columns: 100px 1fr; }
    .contact-action { display: none; }
  }
</style>
</head>
<body>

<nav>
  <button class="nav-logo" onclick="showSection('main')">DUKGOO</button>
  <ul class="nav-links">
    <li><a onclick="showSection('main')" data-section="main">Main</a></li>
    <li><a onclick="showSection('works')" data-section="works">Works</a></li>
    <li><a onclick="showSection('about')" data-section="about">About</a></li>
  </ul>
</nav>

<!-- ══ MAIN ══ -->
<section id="main">
  <div class="main-hero">
    <div class="hero-image-wrap">
      <!--
        이미지를 넣으려면 아래 주석을 해제하고 src에 이미지 파일명을 입력하세요.
        예: <img src="hero.jpg" alt="메인 이미지">
      -->
      <!-- <img src="YOUR_IMAGE.jpg" alt="메인 이미지"> -->
      <div class="hero-placeholder">
        <span class="hero-placeholder-label">Main Image</span>
        <span class="hero-placeholder-size">16 : 9 권장 비율</span>
      </div>
    </div>
    <div class="hero-overlay">
      <h1 class="hero-name">DUKGOO<br><span>ENV</span></h1>
      <div class="hero-tags">
        <span class="hero-tag">Visual Designer</span>
        <span class="hero-tag">Art Director</span>
        <span class="hero-tag">Re:Lighting</span>
      </div>
    </div>
  </div>

  <div class="main-cta">
    <span class="main-cta-title">Portfolio 2024</span>
    <div class="main-cta-btns">
      <button class="btn btn-primary" onclick="showSection('works')">View Works</button>
      <button class="btn btn-ghost" onclick="showSection('about')">About</button>
    </div>
  </div>
</section>

<!-- ══ WORKS ══ -->
<section id="works">
  <div style="max-width:1300px;margin:0 auto;">
    <div class="section-header">
      <h2 class="section-title">Works</h2>
      <span class="section-count" id="works-count">— Projects</span>
    </div>
    <div class="portfolio-grid" id="works-grid"></div>
  </div>
</section>

<!-- ══ ABOUT ══ -->
<section id="about">
  <div style="max-width:800px;margin:0 auto;width:100%;">

    <!-- 1. 프로필 사진 -->
    <div class="about-photo-wrap">
      <!--
        사진을 넣으려면 아래 주석을 해제하고 src에 파일명을 입력하세요.
        예: <img src="profile.jpg" alt="프로필 사진">
      -->
      <!-- <img src="YOUR_PHOTO.jpg" alt="프로필 사진"> -->
      <div class="about-photo-placeholder">
        <span>Profile Photo</span>
        <small>3 : 4 권장 비율</small>
      </div>
    </div>

    <!-- 2. 연락처 -->
    <div class="about-block">
      <p class="about-block-label">Contact</p>
      <div class="contact-list">
        <div class="contact-row">
          <span class="contact-type">Email</span>
          <span class="contact-value">dukgoo.env@gmail.com</span>
          <button class="contact-action" onclick="copyEmail()">Copy ✉</button>
        </div>
        <div class="contact-row">
          <span class="contact-type">Instagram</span>
          <span class="contact-value">@dukgoo.env</span>
          <button class="contact-action" onclick="">Link →</button>
        </div>
        <div class="contact-row">
          <span class="contact-type">Based</span>
          <span class="contact-value">Seoul, Korea</span>
          <span></span>
        </div>
      </div>
    </div>

    <!-- 3. 사용 프로그램 & 스킬 -->
    <div class="about-block">
      <p class="about-block-label">Tools &amp; Skills</p>
      <div class="skills-grid" id="skills-grid"></div>
    </div>

  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕ Close</button>
  <div class="lb-inner">
    <div class="lb-main">
      <div class="lb-img-wrap" id="lb-img-wrap">
        <div class="lb-img-placeholder" id="lb-placeholder">IMAGE</div>
        <img id="lb-img" src="" alt="" style="display:none">
      </div>
      <div class="lb-meta">
        <div class="lb-meta-date" id="lb-date"></div>
        <div class="lb-meta-title" id="lb-title"></div>
      </div>
    </div>
    <div class="lb-sidebar" id="lb-sidebar"></div>
  </div>
  <div class="lb-nav">
    <button onclick="lbMove(-1)">← Prev</button>
    <button onclick="lbMove(1)">Next →</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<footer>
  <div class="footer-logo">DUKGOO</div>
  <button class="footer-email" onclick="copyEmail()">dukgoo.env@gmail.com ✉</button>
  <button class="footer-back" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Back to top</button>
</footer>

<script>
// ── WORKS DATA ──
// 실제 작업물을 추가하려면 아래 배열에 항목을 추가하세요.
// img: 이미지 파일 경로 (없으면 빈 문자열 '')
const works = [
  { id:'w1',  title:'Brand Identity — Studio A',    date:'2024.03', label:'BRANDING',      img:'' },
  { id:'w2',  title:'UI Redesign — Brand Lab',       date:'2023.11', label:'UI/UX',         img:'' },
  { id:'w3',  title:'Campaign Visual — Agency X',    date:'2023.07', label:'EDITORIAL',     img:'' },
  { id:'w4',  title:'Product Launch Kit',            date:'2023.02', label:'ART DIRECTION', img:'' },
  { id:'w5',  title:'Annual Report 2022',            date:'2022.12', label:'PRINT',         img:'' },
  { id:'w6',  title:'Web Experience Design',         date:'2022.08', label:'UI/UX',         img:'' },
  { id:'w7',  title:'Personal Zine Vol.1',           date:'2024.01', label:'PERSONAL',      img:'' },
  { id:'w8',  title:'Color Study Series',            date:'2023.10', label:'PERSONAL',      img:'' },
  { id:'w9',  title:'Re:Light — Dawn',               date:'2024.02', label:'RELIGHT',       img:'' },
  { id:'w10', title:'Re:Light — Dusk',               date:'2023.12', label:'RELIGHT',       img:'' },
];

// ── SKILLS DATA ──
// level: 1~5 (채워진 점 개수)
const skills = [
  { name:'Photoshop',         category:'2D',       level:5 },
  { name:'Illustrator',       category:'2D',       level:5 },
  { name:'After Effects',     category:'Motion',   level:4 },
  { name:'ZBrush',            category:'3D',       level:4 },
  { name:'Substance Painter', category:'3D',       level:4 },
  { name:'Blender',           category:'3D',       level:3 },
  { name:'Figma',             category:'UI/UX',    level:4 },
  { name:'Cinema 4D',         category:'Motion',   level:3 },
  { name:'Lightroom',         category:'Photo',    level:5 },
  { name:'InDesign',          category:'Print',    level:4 },
];

// ── RENDER WORKS ──
function renderWorks() {
  const grid = document.getElementById('works-grid');
  if (!grid || grid.children.length > 0) return;
  works.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'portfolio-card';
    const inner = w.img
      ? `<img src="${w.img}" alt="${w.title}">`
      : `<div class="card-placeholder">${String(i+1).padStart(2,'0')}</div>`;
    card.innerHTML = inner + `
      <div class="card-overlay">
        <div class="card-date">${w.date}</div>
        <div class="card-title">${w.title}</div>
        <div class="card-tag">${w.label}</div>
      </div>`;
    card.onclick = () => openLightbox(i);
    grid.appendChild(card);
  });
  document.getElementById('works-count').textContent = works.length + ' Projects';
}

// ── RENDER SKILLS ──
function renderSkills() {
  const grid = document.getElementById('skills-grid');
  if (!grid || grid.children.length > 0) return;
  skills.forEach(s => {
    const card = document.createElement('div');
    card.className = 'skill-card';
    const dots = Array.from({length:5}, (_,i) =>
      `<div class="skill-dot ${i < s.level ? 'on' : ''}"></div>`
    ).join('');
    card.innerHTML = `
      <div class="skill-name">${s.name}</div>
      <div class="skill-category">${s.category}</div>
      <div class="skill-level">${dots}</div>`;
    grid.appendChild(card);
  });
}

renderWorks();
renderSkills();

// ── SECTION NAV ──
function showSection(name) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('visible'));
  const el = document.getElementById(name);
  if (el) {
    el.classList.add('visible');
    el.classList.remove('fade-in');
    void el.offsetWidth;
    el.classList.add('fade-in');
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.toggle('active', a.dataset.section === name);
  });
}

// ── LIGHTBOX ──
let lbIndex = 0;

function openLightbox(index) {
  lbIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const w = works[lbIndex];
  document.getElementById('lb-title').textContent = w.title;
  document.getElementById('lb-date').textContent = w.date + ' · ' + w.label;

  const imgEl = document.getElementById('lb-img');
  const phEl  = document.getElementById('lb-placeholder');
  if (w.img) {
    imgEl.src = w.img;
    imgEl.style.display = 'block';
    phEl.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    phEl.style.display = 'block';
    phEl.textContent = String(lbIndex + 1).padStart(2,'0');
  }

  const sidebar = document.getElementById('lb-sidebar');
  sidebar.innerHTML = '';
  works.forEach((item, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'lb-thumb' + (i === lbIndex ? ' active' : '');
    if (item.img) {
      thumb.innerHTML = `<img src="${item.img}" alt="${item.title}">`;
    } else {
      thumb.innerHTML = `<div class="lb-thumb-placeholder">${String(i+1).padStart(2,'0')}<br>${item.label}</div>`;
    }
    thumb.onclick = () => { lbIndex = i; updateLightbox(); };
    sidebar.appendChild(thumb);
  });
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbMove(dir) {
  lbIndex = (lbIndex + dir + works.length) % works.length;
  updateLightbox();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbMove(1);
  if (e.key === 'ArrowLeft')  lbMove(-1);
  if (e.key === 'Escape')     closeLightbox();
});

document.getElementById('lightbox').addEventListener('wheel', e => {
  e.preventDefault();
  lbMove(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

// ── EMAIL COPY ──
function copyEmail() {
  navigator.clipboard.writeText('dukgoo.env@gmail.com')
    .then(() => showToast('이메일이 복사되었습니다'))
    .catch(() => showToast('dukgoo.env@gmail.com'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
showSection('main');
</script>
</body>
</html>
